<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Link & File Drive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-800 pt-16 sm:pt-20">

  <!-- Navbar -->
  <nav class="bg-indigo-600 text-white shadow-md fixed top-0 left-0 right-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-14 sm:h-16">
        <div class="flex items-center space-x-2 sm:space-x-3">
          <i class="fa-solid fa-cloud-arrow-up text-xl sm:text-2xl"></i>
          <span class="font-bold text-base sm:text-lg tracking-wide">DriveCatalog</span>
        </div>
        <div class="flex items-center space-x-2">
          <!-- Menu Khusus Admin (Ganti Pass) -->
          <button id="btn-ganti-pass" onclick="openPassModal()" class="hidden bg-indigo-700 hover:bg-indigo-800 px-3 py-1.5 rounded-lg text-xs font-semibold transition items-center border border-indigo-500">
            <i class="fa-solid fa-key mr-1"></i> Ganti Pass
          </button>
          <button id="btn-login-admin" onclick="handleAuthAction()" class="bg-indigo-700 hover:bg-indigo-800 px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg text-xs sm:text-sm font-semibold transition flex items-center shadow border border-indigo-500">
            <i id="icon-login" class="fa-solid fa-lock mr-1.5"></i> <span id="text-login">Login Admin</span>
          </button>
          <button id="btn-tambah-katalog" onclick="openModal()" class="hidden bg-white text-indigo-600 hover:bg-indigo-50 px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg text-xs sm:text-sm font-semibold transition flex items-center shadow">
            <i class="fa-solid fa-plus mr-1.5"></i> Tambah
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <main class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8 py-4 sm:py-6">
    <div class="mb-4 flex justify-between items-center">
      <h2 class="text-lg font-bold text-gray-700 hidden sm:block"><i class="fa-solid fa-folder-tree mr-2 text-indigo-500"></i>Katalog Berkas Berbagi</h2>
      <span id="role-badge" class="inline-block bg-gray-200 text-gray-700 text-xs px-2.5 py-1 rounded-full font-medium shadow-sm">
        <i class="fa-solid fa-eye mr-1"></i> Mode: Pengunjung (Lihat Saja)
      </span>
    </div>

    <!-- Layout Grid Utama (Data Kanan, Live Log Kiri di layar besar) -->
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
      
      <!-- Kolom Kiri: Real-Time Activity Log Stream (Kapasitas 1 Kolom) -->
      <div class="lg:col-span-1 flex flex-col space-y-4">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col h-[480px]">
          <div class="flex items-center justify-between border-b pb-2 mb-3">
            <h3 class="font-bold text-gray-800 text-xs sm:text-sm uppercase tracking-wider flex items-center">
              <span class="flex h-2 w-2 relative mr-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
              </span>
              Log Aktivitas Live
            </h3>
            <button onclick="loadLogs()" class="text-gray-400 hover:text-indigo-600 transition text-xs"><i class="fa-solid fa-rotate"></i></button>
          </div>
          <!-- Box Penampung Aliran Log -->
          <div id="log-stream-box" class="flex-1 overflow-y-auto space-y-2.5 text-[11px] pr-1">
            <p class="text-gray-400 text-center py-4">Menghubungkan ke stream...</p>
          </div>
        </div>
      </div>

      <!-- Kolom Kanan: Dashboard Utama & Grid Katalog (Kapasitas 3 Kolom) -->
      <div class="lg:col-span-3 space-y-4">
        <!-- Dashboard Stats Widgets -->
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-white p-3 sm:p-5 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
            <div>
              <p class="text-[10px] sm:text-sm font-medium text-gray-400 uppercase tracking-tight">Total Koleksi</p>
              <p id="stat-total" class="text-xl sm:text-3xl font-bold text-gray-900 mt-0.5">0</p>
            </div>
            <div class="p-2 sm:p-3 bg-indigo-50 text-indigo-600 rounded-lg"><i class="fa-solid fa-box-open text-base sm:text-xl"></i></div>
          </div>
          <div class="bg-white p-3 sm:p-5 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
            <div>
              <p class="text-[10px] sm:text-sm font-medium text-gray-400 uppercase tracking-tight">Kategori</p>
              <p id="stat-kategori" class="text-xl sm:text-3xl font-bold text-gray-900 mt-0.5">0</p>
            </div>
            <div class="p-2 sm:p-3 bg-emerald-50 text-emerald-600 rounded-lg"><i class="fa-solid fa-folder-tree text-base sm:text-xl"></i></div>
          </div>
        </div>

        <!-- Search Bar -->
        <div class="bg-white p-2.5 sm:p-4 rounded-xl shadow-sm border border-gray-100">
          <div class="relative">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 sm:top-3.5 text-gray-400 text-xs sm:text-sm"></i>
            <input type="text" id="search-input" onkeyup="filterLinks()" placeholder="Cari judul, kategori, atau file..." 
              class="w-full pl-9 pr-3 py-1.5 sm:py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition text-xs sm:text-sm">
          </div>
        </div>

        <!-- Grid Data -->
        <div id="loading-state" class="text-center py-8">
          <i class="fa-solid fa-circle-notch fa-spin text-2xl text-indigo-600"></i>
          <p class="text-gray-500 mt-2 text-xs">Memuat katalog...</p>
        </div>
        <div id="empty-state" class="hidden text-center py-12 bg-white rounded-xl border border-dashed border-gray-200">
          <i class="fa-solid fa-folder-open text-3xl text-gray-300 mb-2"></i>
          <p class="text-gray-500 text-xs">Belum ada data katalog.</p>
        </div>
        <div id="link-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
      </div>

    </div>
  </main>

  <!-- Modal Form Input Data -->
  <div id="form-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 backdrop-blur-sm">
    <div class="bg-white rounded-t-2xl sm:rounded-xl max-w-lg w-full p-4 sm:p-6 shadow-xl relative max-h-[85vh] sm:max-h-[90vh] overflow-y-auto transition-all">
      <div class="flex justify-between items-center border-b pb-2 mb-3">
        <h3 id="modal-title" class="text-base sm:text-lg font-bold text-gray-900">Tambah Data Baru</h3>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 p-1"><i class="fa-solid fa-xmark text-lg"></i></button>
      </div>
      <form id="link-form" onsubmit="handleFormSubmit(event)">
        <input type="hidden" id="form-id">
        <div class="mb-3">
          <label class="block text-[10px] font-semibold text-gray-600 uppercase mb-1">Judul / Nama File</label>
          <input type="text" id="form-judul" required placeholder="Contoh: Laporan Keuangan 2026" class="w-full border rounded-lg px-3 py-1.5 text-xs sm:text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div class="mb-3">
          <label class="block text-[10px] font-semibold text-gray-600 uppercase mb-1">Kategori</label>
          <input type="text" id="form-kategori" required placeholder="Contoh: Excel, Kerja" class="w-full border rounded-lg px-3 py-1.5 text-xs sm:text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div class="mb-3 bg-gray-50 p-2.5 rounded-lg border">
          <label class="block text-[10px] font-semibold text-gray-600 uppercase mb-1.5">Sumber Berkas</label>
          <div class="flex space-x-4 mb-2">
            <label class="inline-flex items-center text-xs cursor-pointer">
              <input type="radio" name="sourceType" value="upload" checked onchange="toggleSourceInput()" class="text-indigo-600">
              <span class="ml-1.5 font-medium text-gray-700">Upload File</span>
            </label>
            <label class="inline-flex items-center text-xs cursor-pointer">
              <input type="radio" name="sourceType" value="url" onchange="toggleSourceInput()" class="text-indigo-600">
              <span class="ml-1.5 font-medium text-gray-700">URL Manual</span>
            </label>
          </div>
          <div id="wrapper-upload"><input type="file" id="form-file" class="w-full text-[11px] text-gray-500 file:py-1 file:px-3 file:rounded file:border-0 file:bg-indigo-50 file:text-indigo-700"></div>
          <div id="wrapper-url" class="hidden"><input type="url" id="form-link" placeholder="https://..." class="w-full border bg-white rounded-lg px-3 py-1.5 text-xs outline-none focus:ring-2 focus:ring-indigo-500"></div>
        </div>
        <div class="mb-4">
          <label class="block text-[10px] font-semibold text-gray-600 uppercase mb-1">Deskripsi Singkat</label>
          <textarea id="form-deskripsi" rows="2" placeholder="Tambahkan deskripsi..." class="w-full border rounded-lg px-3 py-1.5 text-xs outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
        </div>
        <div class="flex justify-end space-x-2">
          <button type="button" onclick="closeModal()" class="px-3 py-2 border rounded-lg text-xs font-medium text-gray-600 hover:bg-gray-50">Batal</button>
          <button type="submit" id="btn-submit" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-xs font-medium">Simpan Data</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Ganti Password Admin -->
  <div id="password-modal" class="fixed inset-0 bg-black/50 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white rounded-xl max-w-sm w-full p-5 shadow-xl relative transition-all">
      <div class="flex justify-between items-center border-b pb-2 mb-3">
        <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wider text-indigo-600"><i class="fa-solid fa-shield-halved mr-1.5"></i>Ganti Keamanan Admin</h3>
        <button onclick="closePassModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="pass-form" onsubmit="handleChangePasswordSubmit(event)">
        <div class="mb-3">
          <label class="block text-[10px] font-semibold text-gray-600 uppercase mb-1">Password Lama</label>
          <input type="password" id="pass-lama" required class="w-full border rounded-lg px-3 py-1.5 text-xs outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div class="mb-3">
          <label class="block text-[10px] font-semibold text-gray-600 uppercase mb-1">Password Baru</label>
          <input type="password" id="pass-baru" required class="w-full border rounded-lg px-3 py-1.5 text-xs outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div class="flex justify-end space-x-2 pt-2">
          <button type="button" onclick="closePassModal()" class="px-3 py-1.5 border rounded-lg text-xs font-medium text-gray-600">Batal</button>
          <button type="submit" id="btn-pass-submit" class="px-4 py-1.5 bg-indigo-600 text-white rounded-lg text-xs font-medium">Perbarui</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // MASUKKAN LINK EXECUTABLE WEB APP GOOGLE SCRIPT ANDA DI SINI
    const urlScript = "https://script.google.com/macros/s/AKfycbwQDgJBOIhnoVDFKjMOQ0BN5CBuhiAmHOS-N3tzRwjOQYyFCIpM3aIEUrCfqJfuSLT1fQ/exec";
    let allLinks = [];
    let isAdmin = false;
    let logInterval;

    document.addEventListener("DOMContentLoaded", function() {
      if (sessionStorage.getItem("isAdmin") === "true") { setAdminMode(true); }
      loadData();
      loadLogs();
      // SISTEM LOG REAL-TIME STREAMING: Menarik data berkala otomatis dari Cloud per 15 detik
      logInterval = setInterval(loadLogs, 15000);
    });

    function handleAuthAction() {
      if (isAdmin) {
        setAdminMode(false);
        sessionStorage.removeItem("isAdmin");
        renderCards(allLinks);
        alert("Mode administrator dinonaktifkan.");
      } else {
        const password = prompt("Masukkan Kredensial Akses Admin:");
        if (password === null) return;
        
        // Memeriksa password terenkripsi via API Sheets
        fetch(urlScript, {
          method: "POST",
          body: JSON.stringify({ action: "login", password: password })
        })
        .then(res => res.json())
        .then(res => {
          if(res.success) {
            setAdminMode(true);
            sessionStorage.setItem("isAdmin", "true");
            renderCards(allLinks);
            loadLogs(); // Instan segarkan log saat admin masuk
            alert(res.message);
          } else { alert(res.message); }
        }).catch(err => alert("Koneksi gagal: " + err));
      }
    }

    function setAdminMode(status) {
      isAdmin = status;
      const btnTambah = document.getElementById('btn-tambah-katalog');
      const btnGantiPass = document.getElementById('btn-ganti-pass');
      const textLogin = document.getElementById('text-login');
      const iconLogin = document.getElementById('icon-login');
      const badge = document.getElementById('role-badge');

      if (status) {
        btnTambah.classList.remove('hidden');
        btnGantiPass.classList.remove('hidden');
        textLogin.innerText = "Logout Admin";
        iconLogin.className = "fa-solid fa-unlock-keyhole mr-1.5";
        badge.className = "inline-block bg-emerald-100 text-emerald-800 text-xs px-2.5 py-1 rounded-full font-semibold shadow-sm";
        badge.innerHTML = `<i class="fa-solid fa-user-gear mr-1"></i> Mode: Administrator`;
      } else {
        btnTambah.classList.add('hidden');
        btnGantiPass.classList.add('hidden');
        textLogin.innerText = "Login Admin";
        iconLogin.className = "fa-solid fa-lock mr-1.5";
        badge.className = "inline-block bg-gray-200 text-gray-700 text-xs px-2.5 py-1 rounded-full font-medium shadow-sm";
        badge.innerHTML = `<i class="fa-solid fa-eye mr-1"></i> Mode: Pengunjung (Lihat Saja)`;
      }
    }

    // MENAMPILKAN ALIRAN LOG SECARA DYNAMIC & REAL-TIME
    function loadLogs() {
      fetch(`${urlScript}?action=getLogs`)
        .then(response => response.json())
        .then(res => {
          const container = document.getElementById('log-stream-box');
          container.innerHTML = '';
          if(!res.logs || res.logs.length === 0) {
            container.innerHTML = '<p class="text-gray-400 text-center py-4">Belum ada riwayat aktivitas.</p>';
            return;
          }
          res.logs.forEach(log => {
            let color = "bg-gray-100 border-gray-300 text-gray-700";
            if(log.tipe === "TAMBAH DATA") color = "bg-emerald-50 border-emerald-200 text-emerald-800";
            if(log.tipe === "EDIT DATA") color = "bg-amber-50 border-amber-200 text-amber-700";
            if(log.tipe === "HAPUS DATA") color = "bg-rose-50 border-rose-200 text-rose-800";
            if(log.tipe === "GANTI PASSWORD") color = "bg-purple-50 border-purple-200 text-purple-800";

            const itemHtml = `
              <div class="p-2.5 rounded-lg border shadow-2xs ${color} transition duration-300">
                <div class="flex justify-between items-center mb-1 font-semibold text-[10px]">
                  <span>${log.tipe}</span>
                  <span class="text-gray-400 font-normal"><i class="fa-regular fa-clock mr-0.5"></i>${log.waktu.split(' ')[1]}</span>
                </div>
                <p class="font-bold tracking-tight text-gray-900 line-clamp-1">${escapeHtml(log.judul)}</p>
                <p class="text-gray-500 font-normal leading-normal mt-0.5">${escapeHtml(log.detail)}</p>
              </div>
            `;
            container.insertAdjacentHTML('beforeend', itemHtml);
          });
        }).catch(err => console.error("Gagal melakukan sinkronisasi log stream:", err));
    }

    function handleChangePasswordSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-pass-submit');
      btn.disabled = true;
      btn.innerText = "...";

      fetch(urlScript, {
        method: "POST",
        body: JSON.stringify({
          action: "changePassword",
          oldPassword: document.getElementById('pass-lama').value,
          newPassword: document.getElementById('pass-baru').value
        })
      })
      .then(res => res.json())
      .then(res => {
        btn.disabled = false;
        btn.innerText = "Perbarui";
        alert(res.message);
        if(res.success) { closePassModal(); loadLogs(); }
      }).catch(err => { alert("Error: " + err); btn.disabled = false; btn.innerText = "Perbarui"; });
    }

    function loadData() {
      showLoading(true);
      fetch(`${urlScript}?action=getDashboard`)
        .then(response => response.json())
        .then(response => {
          if (response && response.links) {
            allLinks = response.links;
            document.getElementById('stat-total').innerText = response.stats.total || 0;
            document.getElementById('stat-kategori').innerText = response.stats.totalKategori || 0;
            renderCards(allLinks);
          }
          showLoading(false);
        }).catch(err => { alert("Gagal mengambil data database: " + err); showLoading(false); });
    }

    function renderCards(data) {
      const grid = document.getElementById('link-grid');
      const emptyState = document.getElementById('empty-state');
      grid.innerHTML = '';
      if(!data || data.length === 0) { emptyState.classList.remove('hidden'); return; }
      emptyState.classList.add('hidden');

      data.forEach((item, index) => {
        let iconClass = "fa-solid fa-link text-indigo-500";
        let btnText = "Buka Tautan";
        const lowercaseLink = (item.link || "").toLowerCase();
        const lowercaseCat = (item.kategori || "").toLowerCase();
        
        if(lowercaseLink.includes(".xlsx") || lowercaseLink.includes("spreadsheet") || lowercaseCat.includes("xls") || lowercaseCat.includes("excel")) {
          iconClass = "fa-solid fa-file-excel text-emerald-600"; btnText = "Buka File Excel";
        } else if(lowercaseLink.includes("drive.google.com")) {
          iconClass = "fa-brands fa-google-drive text-amber-500"; btnText = "Buka Google Drive";
        } else if(lowercaseLink.includes(".pdf")) {
          iconClass = "fa-solid fa-file-pdf text-rose-500"; btnText = "Buka Berkas PDF";
        }

        const adminControls = isAdmin ? `
          <div class="flex space-x-1 text-gray-400">
            <button onclick="editFormByIndex(${index})" class="p-1 hover:text-indigo-600 rounded text-xs"><i class="fa-solid fa-pen-to-square"></i></button>
            <button onclick="deleteConfirm('${item.id}')" class="p-1 hover:text-rose-600 rounded text-xs"><i class="fa-solid fa-trash"></i></button>
          </div>
        ` : '';

        const card = `
          <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 flex flex-col justify-between hover:shadow-md transition duration-200">
            <div>
              <div class="flex items-center justify-between mb-2">
                <span class="inline-block bg-indigo-50 text-indigo-700 text-[10px] px-2 py-0.5 rounded-full font-semibold tracking-wide">${escapeHtml(item.kategori)}</span>
                ${adminControls}
              </div>
              <h4 class="font-bold text-gray-800 text-sm sm:text-base line-clamp-1 mb-0.5">${escapeHtml(item.judul)}</h4>
              <p class="text-[11px] text-gray-500 line-clamp-2 mb-3 h-8">${escapeHtml(item.deskripsi) || 'Tidak ada deskripsi.'}</p>
            </div>
            <a href="${item.link}" target="_blank" class="w-full bg-gray-50 border border-gray-200 hover:bg-indigo-50 hover:border-indigo-200 hover:text-indigo-700 transition py-2 px-3 rounded-lg text-xs font-semibold text-center flex items-center justify-center space-x-1.5">
              <i class="${iconClass} text-xs sm:text-sm"></i>
              <span>${btnText}</span>
              <i class="fa-solid fa-arrow-up-right-from-square text-[9px] opacity-70"></i>
            </a>
          </div>
        `;
        grid.insertAdjacentHTML('beforeend', card);
      });
    }

    function filterLinks() {
      const query = document.getElementById('search-input').value.toLowerCase();
      const filtered = allLinks.filter(item => {
        return (item.judul || "").toLowerCase().includes(query) || (item.kategori || "").toLowerCase().includes(query) || (item.deskripsi || "").toLowerCase().includes(query);
      });
      renderCards(filtered);
    }

    function handleFormSubmit(e) {
      e.preventDefault();
      if (!isAdmin) { alert("Aksi ditolak."); return; }
      const btnSubmit = document.getElementById('btn-submit');
      btnSubmit.disabled = true;
      btnSubmit.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin mr-1"></i>...`;

      const payload = {
        id: document.getElementById('form-id').value, judul: document.getElementById('form-judul').value, kategori: document.getElementById('form-kategori').value, link: document.getElementById('form-link').value, deskripsi: document.getElementById('form-deskripsi').value, fileData: null, fileName: null, fileType: null
      };

      const fileInput = document.getElementById('form-file');
      const inputType = document.querySelector('input[name="sourceType"]:checked').value;

      if (inputType === 'upload' && fileInput.files.length > 0) {
        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
          payload.fileData = e.target.result.split(',')[1]; payload.fileName = file.name; payload.fileType = file.type;
          sendDataToGas(payload, btnSubmit);
        };
        reader.readAsDataURL(file);
      } else { sendDataToGas(payload, btnSubmit); }
    }

    function sendDataToGas(payload, btnSubmit) {
      fetch(urlScript, { method: "POST", body: JSON.stringify({ action: "save", payload: payload }) })
      .then(response => response.json())
      .then(res => {
        btnSubmit.disabled = false; btnSubmit.innerText = "Simpan Data";
        if(res.success) { closeModal(); loadData(); loadLogs(); } else { alert(res.message); }
      }).catch(err => { alert("Error: " + err); btnSubmit.disabled = false; btnSubmit.innerText = "Simpan Data"; });
    }

    function deleteConfirm(id) {
      if (!isAdmin) return;
      if(confirm("Hapus data ini dari katalog?")) {
        showLoading(true);
        fetch(urlScript, { method: "POST", body: JSON.stringify({ action: "delete", id: id }) })
        .then(response => response.json())
        .then(res => { if(res.success) { loadData(); loadLogs(); } else { alert(res.message); showLoading(false); } })
        .catch(err => { alert("Error: " + err); showLoading(false); });
      }
    }

    function toggleSourceInput() {
      const type = document.querySelector('input[name="sourceType"]:checked').value;
      if(type === 'upload') {
        document.getElementById('wrapper-upload').classList.remove('hidden');
        document.getElementById('wrapper-url').classList.add('hidden');
        document.getElementById('form-link').required = false;
      } else {
        document.getElementById('wrapper-upload').classList.add('hidden');
        document.getElementById('wrapper-url').classList.remove('hidden');
      }
    }

    function openModal() {
      document.getElementById('modal-title').innerText = "Tambah Item";
      document.getElementById('link-form').reset();
      document.getElementById('form-id').value = "";
      document.getElementById('form-file').value = "";
      document.querySelectorAll('input[name="sourceType"]')[0].checked = true;
      toggleSourceInput();
      document.getElementById('form-modal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('form-modal').classList.add('hidden'); }
    function openPassModal() { document.getElementById('pass-form').reset(); document.getElementById('password-modal').classList.remove('hidden'); }
    function closePassModal() { document.getElementById('password-modal').classList.add('hidden'); }

    function editFormByIndex(index) {
      const item = allLinks[index];
      if(!item) return;
      document.getElementById('modal-title').innerText = "Edit Info";
      document.getElementById('form-id').value = item.id;
      document.getElementById('form-judul').value = item.judul;
      document.getElementById('form-kategori').value = item.kategori;
      document.querySelectorAll('input[name="sourceType"]')[1].checked = true;
      toggleSourceInput();
      document.getElementById('form-link').value = item.link;
      document.getElementById('form-deskripsi').value = item.deskripsi || "";
      document.getElementById('form-modal').classList.remove('hidden');
    }

    function showLoading(status) {
      const loader = document.getElementById('loading-state');
      const grid = document.getElementById('link-grid');
      if(status) { loader.classList.remove('hidden'); grid.classList.add('opacity-40'); }
      else { loader.classList.add('hidden'); grid.classList.remove('opacity-40'); }
    }

    function escapeHtml(text) {
      if(!text) return '';
      return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
